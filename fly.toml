app = "dugout-football"
primary_region = "jnb"  # Johannesburg — closest to Nairobi

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DEMO_MODE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
