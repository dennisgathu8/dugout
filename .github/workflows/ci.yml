name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Leiningen
        run: |
          mkdir -p ~/.local/bin
          curl https://raw.githubusercontent.com/technomancy/leiningen/stable/bin/lein \
            -o ~/.local/bin/lein
          chmod +x ~/.local/bin/lein
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          ~/.local/bin/lein version
      - name: Cache Leiningen dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-lein-${{ hashFiles('project.clj') }}
          restore-keys: |
            ${{ runner.os }}-lein-
      - name: Install npm dependencies
        run: npm install
      - name: Install clj-kondo
        run: |
          CLJ_KONDO_VERSION="2025.01.16"
          curl -sL "https://github.com/clj-kondo/clj-kondo/releases/download/v${CLJ_KONDO_VERSION}/clj-kondo-${CLJ_KONDO_VERSION}-linux-amd64.zip" \
            -o clj-kondo.zip
          unzip clj-kondo.zip
          sudo mv clj-kondo /usr/local/bin/
          clj-kondo --version
      - name: Lint
        run: clj-kondo --lint src src-cljs test
      - name: Run JVM tests
        env:
          JWT_SECRET: "test-secret-minimum-32-chars-here"
          DEMO_MODE: "true"
        run: lein test
      - name: Build ClojureScript release
        run: npx shadow-cljs release app
      - name: Run ClojureScript tests
        run: |
          npx shadow-cljs compile test
          node target/test/test.js
