<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="dugout — Open source football analytics workbench for African clubs. Squad availability, pressing analysis, player timelines, and live tracking. Powered by Clojure.">
  <title>dugout — Football Analytics</title>
  <style>
    /* Minimal inline CSS — no external CDN needed */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif;
           background: #0D2137; color: #fff; }
    .nav { background: #1A3A5C; padding: 1rem 2rem;
           display: flex; align-items: center; gap: 2rem; }
    .nav a { color: #8FB8D4; text-decoration: none;
             font-size: 0.9rem; }
    .nav a:hover { color: #fff; }
    #app { padding: 2rem; }
    .card { background: #1A3A5C; border-radius: 8px;
            padding: 1.5rem; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: 0.25rem 0.75rem;
             border-radius: 4px; font-size: 0.8rem;
             font-weight: bold; }
    .badge-green { background: #1e7e4e; color: #fff; }
    .badge-amber { background: #b76e00; color: #fff; }
    .badge-red   { background: #8b1a1a; color: #fff; }
    .pitch { width: 100%; max-width: 600px;
             border: 2px solid #2E6DA4; }
  </style>
</head>
<body>
  <div id="app">Loading dugout...</div>
  <script src="/js/main.js"></script>
</body>
</html>
